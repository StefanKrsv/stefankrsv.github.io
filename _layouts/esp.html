<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Flash ESP8266 Firmware</title>
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  </head>
  <body>
    <h1>ESP8266 USB Flasher</h1>

    <esp-web-install-button manifest="firmware.json">
      <button>Install Firmware</button>
    </esp-web-install-button>

    <p>Connect your ESP8266 via USB and click "Install Firmware".</p>
  </body>
</html>
