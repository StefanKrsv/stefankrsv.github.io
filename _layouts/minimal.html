<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #0d0d0d;
        color: #33ff33;
        font-family: 'Courier New', monospace;
        height: 100vh;
        overflow: hidden;
        user-select: none;
      }

      #terminal {
        white-space: pre-wrap;
        padding: 2rem;
        font-size: 1.1rem;
        line-height: 1.5;
      }

      #cursor {
        display: inline;
        animation: blink 0.9s step-start infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      a {
        color: #33aaff;
        text-decoration: underline;
      }

      a:hover {
        color: #66ccff;
      }
    </style>
  </head>
  <body>
    <div id="terminal"></div>
    <span id="cursor">в–Ҡ</span>

    <script>
      const terminal = document.getElementById('terminal');
      const cursor = document.getElementById('cursor');

      const lines = [
        `в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—
  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘
  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘
  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘
  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘ в•ҡв•җв•қ в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘
  в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ     в•ҡв•җв•қв•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•җв•җв•қ`,
        '',
        'Loading system...',
        '',
        'user@site:~$ curl -L /blog',
        'Redirecting...',
        'Visit вҶ’ /blog',
      ];

      let delay = 20; // faster speed
      let i = 0;
      let line = 0;
      let typing = true;

      function typeLine() {
        if (!typing) return;

        if (line >= lines.length) {
          typing = false;
          cursor.style.display = 'none';
          terminal.innerHTML += `\nuser@site:~$ <a href="/blog">Click here to enter</a>\n`;
          return;
        }

        const currentLine = lines[line];
        if (i < currentLine.length) {
          terminal.innerHTML += currentLine.charAt(i);
          i++;
          setTimeout(typeLine, delay);
        } else {
          terminal.innerHTML += '\n';
          i = 0;
          line++;
          setTimeout(typeLine, delay);
        }
      }

      // Instant redirect on click or keypress
      function skipIntro() {
        if (typing) {
          typing = false;
          window.location.href = '/blog';
        }
      }

      document.addEventListener('click', skipIntro);
      document.addEventListener('keydown', skipIntro);

      typeLine();
    </script>
  </body>
</html>
