<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #0d0d0d;
        color: #33ff33;
        font-family: 'Courier New', monospace;
        height: 100vh;
        overflow: hidden;
        user-select: none;
      }

      #terminal {
        white-space: pre-wrap;
        padding: 2rem;
        font-size: 1.1rem;
        line-height: 1.5;
      }

      #cursor {
        display: inline;
        animation: blink 0.9s step-start infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      a {
        color: #33aaff;
        text-decoration: underline;
      }

      a:hover {
        color: #66ccff;
      }
    </style>
  </head>
  <body>
    <div id="terminal"></div>
    <span id="cursor">в–Ҡ</span>

    <script>
      const terminal = document.getElementById('terminal');
      const cursor = document.getElementById('cursor');

      const lines = [
        ` в•”в•Ұв•—в•”в•җв•—в•”в•җв•—в•”в•Ұв•—
  в•‘ в•‘в•Ј в•ҡв•җв•— в•‘
  в•© в•ҡв•җв•қв•ҡв•җв•қ в•© `,

        '',
        'Loading system...',
        '',
        'user@site:~$ curl -L /blog',
        'Redirecting...',
        'Visit вҶ’ /blog',
      ];

      let delay = 20;
      let i = 0;
      let line = 0;
      let typing = true;

      function renderTerminal(content) {
        terminal.innerHTML = content;
        terminal.parentNode.appendChild(cursor); // ensure cursor always follows
      }

      let fullText = '';

      function typeLine() {
        if (!typing) return;

        if (line >= lines.length) {
          endSequence();
          return;
        }

        const currentLine = lines[line];
        if (i < currentLine.length) {
          fullText += currentLine.charAt(i);
          renderTerminal(fullText);
          i++;
          setTimeout(typeLine, delay);
        } else {
          fullText += '\n';
          renderTerminal(fullText);
          i = 0;
          line++;
          setTimeout(typeLine, delay);
        }
      }

      function skipToEnd() {
        if (!typing) return;

        typing = false;
        fullText = lines.join('\n') + '\n\nuser@site:~$ ';
        renderTerminal(fullText + `<a href="/blog">Click here to enter</a>\n`);
        cursor.style.display = 'none';
      }

      function endSequence() {
        typing = false;
        renderTerminal(fullText + `\nuser@site:~$ <a href="/blog">Click here to enter</a>\n`);
        cursor.style.display = 'none';
      }

      document.addEventListener('click', skipToEnd);
      document.addEventListener('keydown', skipToEnd);

      typeLine();
    </script>
  </body>
</html>
