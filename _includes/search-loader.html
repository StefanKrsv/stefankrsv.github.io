<!--
  Jekyll Simple Search loader
  See: <https://github.com/christian-fei/Simple-Jekyll-Search>
-->

<!-- Hidden templates for search results -->
<template id="search-result-template">
  <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
    <header>
      <h2><a href="{url}">{title}</a></h2>
      <div class="post-meta d-flex flex-column flex-sm-row text-muted mt-1 mb-1">
        {categories}
        {tags}
      </div>
    </header>
    <p>{content}</p>
  </article>
</template>

<template id="search-not-found-template">
  <p class="mt-5">{{ site.data.locales[include.lang].search.no_results }}</p>
</template>

<!-- Data attribute for search JSON path -->
<div data-search-json="{{ '/assets/js/data/search.json' | relative_url }}" style="display: none;"></div>

<!-- Turbo-compatible script that runs on every page load -->
<script type="module">
  // This will run on every Turbo navigation
  function initializeSearch() {
    // Check if SimpleJekyllSearch is available
    if (typeof SimpleJekyllSearch === 'undefined') {
      console.warn('SimpleJekyllSearch is not loaded yet');
      return;
    }

    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('search-results');

    if (!searchInput || !resultsContainer) {
      return;
    }

    // Clear previous results
    resultsContainer.innerHTML = '';

    // Get templates
    const templateElement = document.getElementById('search-result-template');
    const notFoundElement = document.getElementById('search-not-found-template');

    const resultTemplate = templateElement ? templateElement.innerHTML.trim() : '';
    const notFoundText = notFoundElement ? notFoundElement.innerHTML.trim() : '';

    // Get search JSON path
    const searchJsonPath = document.querySelector('[data-search-json]')?.dataset.searchJson || '{{ '/assets/js/data/search.json' | relative_url }}';

    // Initialize SimpleJekyllSearch
    SimpleJekyllSearch({
      searchInput: searchInput,
      resultsContainer: resultsContainer,
      json: searchJsonPath,
      searchResultTemplate: resultTemplate,
      noResultsText: notFoundText,
      templateMiddleware: function(prop, value, template) {
        if (prop === 'categories') {
          if (value === '') {
            return `${value}`;
          } else {
            return `<div class="me-sm-4"><i class="far fa-folder fa-fw"></i>${value}</div>`;
          }
        }
        if (prop === 'tags') {
          if (value === '') {
            return `${value}`;
          } else {
            return `<div><i class="fa fa-tag fa-fw"></i>${value}</div>`;
          }
        }
      }
    });
  }

  // Initialize on Turbo events
  document.addEventListener('turbo:load', initializeSearch);
  document.addEventListener('turbo:render', initializeSearch);

  // Initialize immediately if Turbo hasn't loaded yet (fallback)
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeSearch);
  } else {
    initializeSearch();
  }
</script>
